#config-version=FG100E-7.0.0
config system global
    set hostname "FG-EDGE-01"
    set timezone 04
end

config system interface
    edit "port1"
        set vdom "root"
        set ip 10.0.0.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set role wan
    next
    edit "port2"
        set vdom "root"
        set ip 192.168.1.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set role lan
    next
    edit "port3"
        set vdom "root"
        set ip 192.168.10.1 255.255.255.0
        set allowaccess ping
        set type physical
        set role lan
    next
end

config firewall address
    edit "LAN_NET"
        set subnet 192.168.1.0 255.255.255.0
    next
    edit "DMZ_NET"
        set subnet 192.168.10.0 255.255.255.0
    next
    edit "WEB_SERVER"
        set subnet 192.168.10.50 255.255.255.255
    next
    edit "PARTNER_RANGE"
        set type iprange
        set start-ip 203.0.113.10
        set end-ip 203.0.113.20
    next
    edit "CDN_FQDN"
        set type fqdn
        set fqdn "cdn.example.com"
    next
end

config firewall addrgrp
    edit "INTERNAL_NETS"
        set member "LAN_NET" "DMZ_NET"
    next
end

config firewall service custom
    edit "HTTP_ALT"
        set tcp-portrange 8080
    next
    edit "APP_PORTS"
        set tcp-portrange 8443:8445
    next
    edit "DNS_UDP"
        set protocol UDP
        set udp-portrange 53
    next
end

config firewall policy
    edit 1
        set name "LAN_to_WAN"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "LAN_NET"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
        set logtraffic all
    next
    edit 2
        set name "WAN_to_WEB"
        set srcintf "port1"
        set dstintf "port3"
        set srcaddr "all"
        set dstaddr "WEB_SERVER"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "HTTP_ALT"
        set logtraffic all
    next
    edit 3
        set name "Block_Partner"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "PARTNER_RANGE"
        set dstaddr "LAN_NET"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
    next
    edit 4
        set name "Missing_Ref_Demo"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "DOES_NOT_EXIST"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "CUSTOM_SVC_MISSING"
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 10.0.0.254
        set device "port1"
    next
    edit 2
        set dst 10.20.0.0 255.255.0.0
        set gateway 192.168.1.254
        set device "port2"
    next
end

config vpn ssl settings
    set servercert "Fortinet_Factory"
    set tunnel-ip-pools "SSLVPN_TUNNEL_ADDR1"
end

config vpn ipsec phase1-interface
    edit "to-branch"
        set interface "port1"
        set peertype any
        set proposal aes256-sha256
        set remote-gw 198.51.100.1
        set psksecret ********
    next
end
